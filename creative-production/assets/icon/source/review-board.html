<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wakeve App Icon Direction</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #181818; }
main { padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; align-items: start; }
figure { margin: 0; }
img { width: 100%; height: auto; display: block; border: 1px solid #e5e5e5; border-radius: 8px; background: #fafafa; }
figcaption { margin-top: 8px; font-size: 13px; line-height: 1.3; color: #333; }
.prompt-card { border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px; background: #fafafa; }
.prompt-card figcaption { margin-top: 0; font-weight: 700; }
.prompt-card figcaption span { display: inline-block; margin-left: 6px; color: #7a4b16; font-weight: 600; }
.prompt-card p { margin: 10px 0 0; font-size: 12px; line-height: 1.45; color: #555; }
.empty-state { border: 1px solid #e5e5e5; border-radius: 8px; padding: 18px; color: #555; background: #fafafa; }

</style>
</head>
<body><main><div class="grid"><figure><a href="wakeve-icon-1024-dark.png"><img src="wakeve-icon-1024-dark.png" alt="iOS App Icon Dark"></a><figcaption>01. iOS App Icon Dark</figcaption></figure><figure><a href="wakeve-icon-1024-light.png"><img src="wakeve-icon-1024-light.png" alt="iOS App Icon Light"></a><figcaption>02. iOS App Icon Light</figcaption></figure><figure><a href="wakeve-icon-tinted-dark.png"><img src="wakeve-icon-tinted-dark.png" alt="iOS Tinted Dark"></a><figcaption>03. iOS Tinted Dark</figcaption></figure><figure><a href="wakeve-icon-tinted-light.png"><img src="wakeve-icon-tinted-light.png" alt="iOS Tinted Light"></a><figcaption>04. iOS Tinted Light</figcaption></figure></div></main></body>
</html>
