name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Shared module tests (JVM)
  # ──────────────────────────────────────────────
  shared-tests:
    name: Shared JVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run shared JVM tests
        run: ./gradlew shared:jvmTest --no-configuration-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-results
          path: shared/build/reports/tests/

  # ──────────────────────────────────────────────
  # Android build
  # ──────────────────────────────────────────────
  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Android debug APK
        run: ./gradlew composeApp:assembleDebug --no-configuration-cache

  # ──────────────────────────────────────────────
  # Server build & tests
  # ──────────────────────────────────────────────
  server-tests:
    name: Server Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build server
        run: ./gradlew server:compileKotlin --no-configuration-cache

      - name: Run server tests
        run: ./gradlew server:test --no-configuration-cache
        continue-on-error: true  # Server tests have known NPE issues with in-memory DB

  # ──────────────────────────────────────────────
  # iOS App Intents system integration tests
  # ──────────────────────────────────────────────
  ios-app-intents-tests:
    name: iOS AppIntentsTesting
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check AppIntentsTesting availability
        shell: bash
        run: |
          FRAMEWORK="$(xcode-select -p)/Platforms/iPhoneSimulator.platform/Developer/Library/Frameworks/AppIntentsTesting.framework"
          if [[ ! -d "$FRAMEWORK" ]]; then
            echo "::error::AppIntentsTesting.framework is not available on this Xcode image. Use an Xcode/iOS runtime that supports AppIntentsTesting."
            exit 1
          fi

          if ! xcrun simctl list runtimes | grep -q "iOS 27"; then
            echo "::error::No iOS 27 simulator runtime is available on this Xcode image. WakeveAppIntentsTests must run on an AppIntentsTesting-compatible runtime."
            exit 1
          fi

          echo "AppIntentsTesting.framework and an iOS 27 simulator runtime are available."

      - name: Build App Intents tests
        run: |
          xcrun xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme WakeveApp \
            -testPlan WakeveTest \
            -destination 'platform=iOS Simulator,OS=27.0,name=iPhone 17 Pro' \
            -only-testing:WakeveAppIntentsTests \
            build-for-testing \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) WAKEVE_APP_INTENTS_REQUIRE_RUNTIME_EXECUTION'

      - name: Verify exported App Intents metadata
        shell: bash
        run: |
          APP_BUNDLE="$(find ~/Library/Developer/Xcode/DerivedData -path '*/Build/Products/Debug-iphonesimulator/Wakeve.app' -type d | head -n 1)"
          METADATA="$APP_BUNDLE/Metadata.appintents/extract.actionsdata"
          if [[ ! -f "$METADATA" ]]; then
            echo "::error::Missing Metadata.appintents/extract.actionsdata in Wakeve.app."
            exit 1
          fi

          for expected in \
            "CreateEventIntent" \
            "UpdateEventIntent" \
            "InviteParticipantsIntent" \
            "CreatePollIntent" \
            "VoteIntent" \
            "ProposeTransportIntent" \
            "OpenEventIntent" \
            "SummarizeEventIntent" \
            "ViewUpcomingEventsIntent" \
            "SeedWakeveTestDataIntent" \
            "ClearWakeveTestDataIntent" \
            "OpenWakeveScreenForTestIntent" \
            "DeleteEventForTestIntent" \
            "FinalizeEventForTestIntent" \
            "ClosePollForTestIntent" \
            "Create event with" \
            "Plan with" \
            "Open event in" \
            "Summarize event in" \
            "Create a poll in" \
            "Invite participants with" \
            "Vote in" \
            "Propose transport with" \
            "Show upcoming events in"; do
            if ! strings "$METADATA" | grep -Fq "$expected"; then
              echo "::error::Expected App Intents metadata string not found: $expected"
              exit 1
            fi
          done

      - name: Run App Intents tests
        shell: bash
        run: |
          set -o pipefail
          xcrun xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme WakeveApp \
            -testPlan WakeveTest \
            -destination 'platform=iOS Simulator,OS=27.0,name=iPhone 17 Pro' \
            -only-testing:WakeveAppIntentsTests \
            test-without-building \
            CODE_SIGNING_ALLOWED=NO | tee app-intents-test.log

      - name: Assert App Intents tests executed without skips
        shell: bash
        run: |
          SUMMARY="$(grep -E 'Executed [0-9]+ tests' app-intents-test.log | tail -n 1 || true)"
          if [[ -z "$SUMMARY" ]]; then
            echo "::error::Could not find an App Intents test execution summary."
            exit 1
          fi

          if ! grep -Eq 'Executed [1-9][0-9]* tests' <<< "$SUMMARY"; then
            echo "::error::App Intents test run did not execute any tests: $SUMMARY"
            exit 1
          fi

          if grep -Eq 'with [1-9][0-9]* tests? skipped|with [1-9][0-9]* skips?' <<< "$SUMMARY"; then
            echo "::error::App Intents test run reported skipped tests: $SUMMARY"
            exit 1
          fi

          if ! grep -Eq '0 failures' <<< "$SUMMARY"; then
            echo "::error::App Intents test run did not report zero failures: $SUMMARY"
            exit 1
          fi

      - name: Upload App Intents result bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-intents-xcresults
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Web App (SvelteKit) build
  # ──────────────────────────────────────────────
  web-build:
    name: Web App Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: apps/landing
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit app
        working-directory: apps/landing
        run: pnpm run build

  # ──────────────────────────────────────────────
  # Code formatting check
  # ──────────────────────────────────────────────
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Kotlin formatting
        run: ./gradlew spotlessCheck --no-configuration-cache
        continue-on-error: true  # Non-blocking initially
