name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Shared module tests (JVM)
  # ──────────────────────────────────────────────
  shared-tests:
    name: Shared JVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run shared JVM tests
        run: ./gradlew shared:jvmTest --no-configuration-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-results
          path: shared/build/reports/tests/

  # ──────────────────────────────────────────────
  # Android build
  # ──────────────────────────────────────────────
  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Android debug APK
        run: ./gradlew composeApp:assembleDebug --no-configuration-cache

  # ──────────────────────────────────────────────
  # Server build & tests
  # ──────────────────────────────────────────────
  server-tests:
    name: Server Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build server
        run: ./gradlew server:compileKotlin --no-configuration-cache

      - name: Run server tests
        run: ./gradlew server:test --no-configuration-cache
        continue-on-error: true  # Server tests have known NPE issues with in-memory DB

  # ──────────────────────────────────────────────
  # Code formatting check
  # ──────────────────────────────────────────────
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Kotlin formatting
        run: ./gradlew spotlessCheck --no-configuration-cache
        continue-on-error: true  # Non-blocking initially
