name: Store Readiness

on:
  push:
    branches: [release/*]
  pull_request:
    branches: [main]
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'iosApp/**'
      - 'fastlane/**'
      - 'composeApp/metadata/**'
  workflow_dispatch:

concurrency:
  group: store-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Gate 1: Build Gate (Android + iOS)
  # ──────────────────────────────────────────────
  build-android:
    name: 🔨 Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android Release Bundle
        run: ./gradlew composeApp:bundleRelease --no-configuration-cache

      - name: Check AAB exists
        run: |
          AAB_PATH="composeApp/build/outputs/bundle/release/composeApp-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "❌ AAB not found at $AAB_PATH"
            exit 1
          fi
          SIZE=$(du -m "$AAB_PATH" | cut -f1)
          echo "✅ AAB built successfully (${SIZE} MB)"
          if [ "$SIZE" -gt 150 ]; then
            echo "⚠️ AAB exceeds 150 MB — review size"
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: composeApp/build/outputs/bundle/release/*.aab

  build-ios:
    name: 🔨 Build iOS (Xcode)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS framework
        run: ./gradlew composeApp:compileKotlinIosArm64 --no-configuration-cache

  # ──────────────────────────────────────────────
  # Gate 2: Test Gate
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared JVM tests
        run: ./gradlew shared:jvmTest --no-configuration-cache

      - name: Run shared common tests
        run: ./gradlew shared:allTests --no-configuration-cache || true
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: shared/build/reports/tests/

  # ──────────────────────────────────────────────
  # Gate 3: Security Gate
  # ──────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          SECRETS_FOUND=0

          # Check for common secret patterns
          patterns=(
            "password\s*=\s*[\"'][^\"']+[\"']"
            "secret\s*=\s*[\"'][^\"']+[\"']"
            "api_key\s*=\s*[\"'][^\"']+[\"']"
            "apiKey\s*=\s*[\"'][A-Za-z0-9]{20,}[\"']"
            "PRIVATE_KEY"
            "BEGIN RSA"
          )

          for pattern in "${patterns[@]}"; do
            matches=$(grep -rnE "$pattern" --include="*.kt" --include="*.swift" --include="*.xml" \
              composeApp/src/ shared/src/ iosApp/src/ 2>/dev/null | grep -v "test\|Test\|example\|sample" || true)
            if [ -n "$matches" ]; then
              echo "⚠️ Pattern '$pattern' found:"
              echo "$matches"
              SECRETS_FOUND=1
            fi
          done

          if [ "$SECRETS_FOUND" -eq 1 ]; then
            echo "::warning::Potential secrets found — review manually"
          else
            echo "✅ No obvious secrets detected"
          fi

      - name: Check for hardcoded localhost URLs
        run: |
          echo "Scanning for hardcoded localhost URLs in production code..."
          LOCALHOST=$(grep -rn "localhost\|127\.0\.0\.1\|10\.0\.2\.2" \
            --include="*.kt" --include="*.swift" \
            composeApp/src/ shared/src/ iosApp/src/ 2>/dev/null | \
            grep -v "test\|Test\|comment\|//\|jvmMain" || true)

          if [ -n "$LOCALHOST" ]; then
            echo "⚠️ Hardcoded localhost URLs found — must be replaced for production:"
            echo "$LOCALHOST"
            echo "::warning::Hardcoded localhost URLs detected — configure server URL via environment variable"
          else
            echo "✅ No hardcoded localhost URLs"
          fi

      - name: Check debug artifacts
        run: |
          echo "Scanning for debug artifacts..."
          DEBUG=$(grep -rn "BuildConfig.DEBUG" --include="*.kt" composeApp/src/ shared/src/ 2>/dev/null | grep -v "test\|Test" || true)
          if [ -n "$DEBUG" ]; then
            echo "ℹ️ BuildConfig.DEBUG references found:"
            echo "$DEBUG"
          fi

          echo ""
          echo "Scanning for TODO markers..."
          TODOS=$(grep -rn "TODO" --include="*.kt" --include="*.swift" composeApp/src/ shared/src/ iosApp/src/ 2>/dev/null | wc -l)
          echo "ℹ️ Found $TODOS TODO markers (informational)"

  # ──────────────────────────────────────────────
  # Gate 4: Metadata Validation
  # ──────────────────────────────────────────────
  metadata:
    name: 📋 Store Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate store metadata
        run: |
          echo "=== Validating Store Metadata ==="
          ERRORS=0

          # Check required metadata directories
          for platform in android ios; do
            for locale in en-US fr-FR; do
              dir="composeApp/metadata/$platform/$locale"
              if [ ! -d "$dir" ]; then
                echo "❌ Missing metadata directory: $dir"
                ERRORS=$((ERRORS + 1))
                continue
              fi

              echo "📁 Checking $platform/$locale..."

              # Check title
              if [ -f "$dir/title.txt" ] || [ -f "$dir/name.txt" ]; then
                title=$(cat "$dir/title.txt" 2>/dev/null || cat "$dir/name.txt" 2>/dev/null)
                if [ ${#title} -eq 0 ]; then
                  echo "  ❌ Title is empty"
                  ERRORS=$((ERRORS + 1))
                elif [ ${#title} -gt 30 ]; then
                  echo "  ❌ Title exceeds 30 chars (${#title})"
                  ERRORS=$((ERRORS + 1))
                else
                  echo "  ✅ Title: $title (${#title} chars)"
                fi
              else
                echo "  ❌ No title.txt or name.txt"
                ERRORS=$((ERRORS + 1))
              fi

              # Check description
              if [ -f "$dir/full_description.txt" ] || [ -f "$dir/description.txt" ]; then
                desc=$(cat "$dir/full_description.txt" 2>/dev/null || cat "$dir/description.txt" 2>/dev/null)
                if [ ${#desc} -eq 0 ]; then
                  echo "  ❌ Description is empty"
                  ERRORS=$((ERRORS + 1))
                elif [ ${#desc} -gt 4000 ]; then
                  echo "  ❌ Description exceeds 4000 chars (${#desc})"
                  ERRORS=$((ERRORS + 1))
                else
                  echo "  ✅ Description (${#desc} chars)"
                fi
              else
                echo "  ❌ No description file"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done

          # Check legal pages
          for file in docs/PRIVACY_POLICY.md docs/TERMS_OF_SERVICE.md; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ Missing $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS metadata errors found"
            exit 1
          else
            echo "✅ All metadata validations passed"
          fi

  # ──────────────────────────────────────────────
  # Gate 5: Code Quality
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Kotlin formatting
        run: ./gradlew spotlessCheck --no-configuration-cache
        continue-on-error: true

      - name: Lint check
        run: ./gradlew composeApp:lintDebug --no-configuration-cache || true
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Summary Gate
  # ──────────────────────────────────────────────
  readiness-summary:
    name: 🚦 Store Readiness Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, test, security, metadata, lint]
    if: always()
    steps:
      - name: Gate Results
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║    STORE READINESS GATE SUMMARY      ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ Build Android:  ${{ needs.build-android.result }}"
          echo "║ Build iOS:      ${{ needs.build-ios.result }}"
          echo "║ Tests:          ${{ needs.test.result }}"
          echo "║ Security:       ${{ needs.security.result }}"
          echo "║ Metadata:       ${{ needs.metadata.result }}"
          echo "║ Lint:           ${{ needs.lint.result }}"
          echo "╚══════════════════════════════════════╝"

          if [ "${{ needs.build-android.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.metadata.result }}" == "failure" ]; then
            echo "❌ BLOCKING: Critical gates failed"
            exit 1
          fi

          echo "✅ All critical gates passed — ready for submission"
