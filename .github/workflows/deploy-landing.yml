name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: apps/landing
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit (adapter-cloudflare)
        working-directory: apps/landing
        run: pnpm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/landing
          command: deploy

      - name: Verify deployment
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          sleep 3
          # Query the Workers.dev subdomain directly to avoid Cloudflare
          # Bot Fight Mode on the custom domain (returns 403 to datacenter IPs).
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 \
            https://wakeve-landing.guyghost.workers.dev/)
          echo "workers.dev status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Worker returned $STATUS — check the Worker logs."
            exit 1
          fi

          # Also verify the custom domain is attached via the API.
          DOMAIN_STATUS=$(curl -sS --max-time 15 \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/domains" \
            | grep -o '"hostname":"wakeve.app"' | head -1)
          echo "Custom domain check: ${DOMAIN_STATUS:-not found}"
          if [ -z "$DOMAIN_STATUS" ]; then
            echo "⚠️  Custom domain wakeve.app not attached to Worker."
            exit 1
          fi

          echo "✅ Landing deployed and custom domain attached."
