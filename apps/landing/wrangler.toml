#:schema node_modules/wrangler/config-schema.json
name = "wakeve-landing"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# SvelteKit adapter-cloudflare output: Worker entry + static assets in the same dir.
main = ".svelte-kit/cloudflare/_worker.js"
assets = { directory = ".svelte-kit/cloudflare", binding = "ASSETS" }

# The landing/public web app is served at the apex domain wakeve.app.
# Custom domains and DNS are configured in the Cloudflare dashboard or via:
#   wrangler zones add wakeve.app
# Then set the custom hostname on this Worker (Dashboard > Workers > wakeve-landing > Settings > Triggers).

# Environment variables that are safe to commit.
# Secrets (APPLE_TEAM_ID, etc.) are set via `wrangler secret put APPLE_TEAM_ID`.
[vars]
SITE_URL = "https://wakeve.app"
API_URL = "https://api.wakeve.app"

# The AASA endpoint reads APPLE_TEAM_ID from secret/env at runtime.
# Set it with: wrangler secret put APPLE_TEAM_ID
